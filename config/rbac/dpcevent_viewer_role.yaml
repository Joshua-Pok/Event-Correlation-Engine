# This rule is not used by the project event-correlation-engine itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to correlation.dell.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: event-correlation-engine
    app.kubernetes.io/managed-by: kustomize
  name: dpcevent-viewer-role
rules:
- apiGroups:
  - correlation.dell.com
  resources:
  - dpcevents
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - correlation.dell.com
  resources:
  - dpcevents/status
  verbs:
  - get
